openapi: 3.0.0
info:
  title: Hexagonal Arch Template API
  version: 0.0.0
tags:
  - name: Health
  - name: Auth
  - name: Settings
  - name: Prompts
  - name: Agents
paths:
  /api/auth/login:
    post:
      operationId: login
      summary: Login
      description: Authenticate with username and password. Sets an HttpOnly session cookie on success.
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.LoginResponse'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.ErrorResponse'
        '429':
          description: Client error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.ErrorResponse'
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Models.LoginRequest'
  /api/auth/logout:
    post:
      operationId: logout
      summary: Logout
      description: End the current session. Clears the session cookie.
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.LogoutResponse'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.ErrorResponse'
      tags:
        - Auth
  /api/auth/me:
    get:
      operationId: getMe
      summary: Current user
      description: Get the currently authenticated user.
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.MeResponse'
        '401':
          description: Access is unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.ErrorResponse'
      tags:
        - Auth
  /api/auth/status:
    get:
      operationId: getAuthStatus
      summary: Auth status
      description: Check whether authentication is required for this instance.
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.AuthStatusResponse'
      tags:
        - Auth
  /api/v1/agents:
    get:
      operationId: listAgents
      summary: List agents
      description: List all agents with pagination.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 20
          explode: false
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 0
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.AgentListResponse'
      tags:
        - Agents
    post:
      operationId: createAgent
      summary: Create agent
      description: Create a new agent.
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.AgentResponse'
      tags:
        - Agents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Models.CreateAgentRequest'
  /api/v1/agents/{id}:
    get:
      operationId: getAgent
      summary: Get agent
      description: Get a single agent by ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.AgentResponse'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.ErrorResponse'
      tags:
        - Agents
    put:
      operationId: updateAgent
      summary: Update agent
      description: Update an existing agent.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.AgentResponse'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.ErrorResponse'
      tags:
        - Agents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Models.UpdateAgentRequest'
    delete:
      operationId: deleteAgent
      summary: Delete agent
      description: Delete an agent.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.ErrorResponse'
      tags:
        - Agents
  /api/v1/prompts:
    get:
      operationId: listPrompts
      summary: List prompts
      description: List all prompts with pagination.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 20
          explode: false
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 0
          explode: false
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.PromptListResponse'
      tags:
        - Prompts
    post:
      operationId: createPrompt
      summary: Create prompt
      description: Create a new prompt.
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.PromptResponse'
      tags:
        - Prompts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Models.CreatePromptRequest'
  /api/v1/prompts/{id}:
    get:
      operationId: getPrompt
      summary: Get prompt
      description: Get a single prompt by ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.PromptResponse'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.ErrorResponse'
      tags:
        - Prompts
    put:
      operationId: updatePrompt
      summary: Update prompt
      description: Update an existing prompt.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.PromptResponse'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.ErrorResponse'
      tags:
        - Prompts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Models.UpdatePromptRequest'
    delete:
      operationId: deletePrompt
      summary: Delete prompt
      description: Delete a prompt.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.ErrorResponse'
      tags:
        - Prompts
  /api/v1/provider-types:
    get:
      operationId: listProviderTypes
      summary: List provider types
      description: List metadata about all supported provider types for dynamic UI rendering.
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.ProviderTypeListResponse'
      tags:
        - Settings
  /api/v1/settings/providers:
    get:
      operationId: listProviders
      summary: List providers
      description: List all configured providers.
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.ProviderListResponse'
      tags:
        - Settings
    post:
      operationId: createProvider
      summary: Create provider
      description: Create a new provider configuration.
      parameters: []
      responses:
        '201':
          description: The request has succeeded and a new resource has been created as a result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.ProviderResponse'
        '409':
          description: The request conflicts with the current state of the server.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.ErrorResponse'
      tags:
        - Settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Models.CreateProviderRequest'
  /api/v1/settings/providers/{id}:
    get:
      operationId: getProvider
      summary: Get provider
      description: Get a single provider by ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.ProviderResponse'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.ErrorResponse'
      tags:
        - Settings
    put:
      operationId: updateProvider
      summary: Update provider
      description: Update an existing provider configuration.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.ProviderResponse'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.ErrorResponse'
        '409':
          description: The request conflicts with the current state of the server.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.ErrorResponse'
      tags:
        - Settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Models.UpdateProviderRequest'
    delete:
      operationId: deleteProvider
      summary: Delete provider
      description: Delete a provider configuration.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 'There is no content to send for this request, but the headers may be useful. '
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.ErrorResponse'
      tags:
        - Settings
  /api/v1/settings/providers/{id}/test:
    post:
      operationId: testProvider
      summary: Test provider connectivity
      description: Test provider connectivity by making a lightweight API call.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.TestProviderResponse'
        '404':
          description: The server cannot find the requested resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.ErrorResponse'
      tags:
        - Settings
  /livez:
    get:
      operationId: Health_liveness
      summary: Liveness check
      description: Liveness probe. Returns 200 if the server process is running.
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.HealthCheckResponse'
      tags:
        - Health
  /readyz:
    get:
      operationId: Health_readiness
      summary: Readiness check
      description: Readiness probe. Returns 200 if the server is ready to accept traffic.
      parameters: []
      responses:
        '200':
          description: The request has succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.HealthCheckResponse'
        '503':
          description: Service unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Models.HealthCheckResponse'
      tags:
        - Health
components:
  schemas:
    Models.AgentListResponse:
      type: object
      required:
        - agents
        - total
        - limit
        - offset
      properties:
        agents:
          type: array
          items:
            $ref: '#/components/schemas/Models.AgentResponse'
          description: Array of agents.
        total:
          type: integer
          format: int32
          description: Total number of agents.
        limit:
          type: integer
          format: int32
          description: Number of agents per page.
        offset:
          type: integer
          format: int32
          description: Number of agents skipped.
      description: Paginated list of agents.
    Models.AgentResponse:
      type: object
      required:
        - id
        - name
        - providerId
        - providerName
        - providerType
        - modelId
        - temperature
        - topP
        - topK
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          description: Unique agent ID.
        name:
          type: string
          description: Display name for this agent.
        providerId:
          type: string
          description: ID of the provider this agent uses.
        providerName:
          type: string
          description: Resolved display name of the provider.
        providerType:
          allOf:
            - $ref: '#/components/schemas/Models.ProviderType'
          description: Resolved type of the provider.
        modelId:
          type: string
          description: Model identifier (e.g. gemini-2.5-flash, gpt-4o).
        systemPromptId:
          type: string
          description: ID of the system prompt, if any.
        systemPromptName:
          type: string
          description: Resolved name of the system prompt, if any.
        temperature:
          type: number
          format: float
          description: Sampling temperature.
        topP:
          type: number
          format: float
          description: Nucleus sampling (top-p).
        topK:
          type: integer
          format: int32
          description: Top-k sampling.
        createdAt:
          type: string
          format: date-time
          description: When this agent was created.
        updatedAt:
          type: string
          format: date-time
          description: When this agent was last updated.
      description: An AI agent configuration.
    Models.AnthropicProviderConfig:
      type: object
      description: Anthropic provider config (no extra fields needed).
    Models.AuthStatusResponse:
      type: object
      required:
        - required
      properties:
        required:
          type: boolean
          description: True if AUTH_CREDENTIALS is configured and non-empty.
      description: Response indicating whether authentication is required.
    Models.AzureAIFoundryProviderConfig:
      type: object
      description: Azure AI Foundry provider config (no extra fields needed, uses base_url for endpoint and api_key).
    Models.AzureOpenAIProviderConfig:
      type: object
      required:
        - deploymentName
        - apiVersion
      properties:
        deploymentName:
          type: string
          description: Azure deployment name.
        apiVersion:
          type: string
          description: Azure API version (e.g. "2024-10-21").
      description: Azure OpenAI provider config.
    Models.BedrockProviderConfig:
      type: object
      required:
        - region
        - accessKeyId
        - secretAccessKey
      properties:
        region:
          type: string
          description: AWS region (e.g. "us-east-1").
        accessKeyId:
          type: string
          description: AWS access key ID.
        secretAccessKey:
          type: string
          description: AWS secret access key.
        sessionToken:
          type: string
          description: AWS session token (optional).
      description: AWS Bedrock provider config.
    Models.ConfigFieldInfo:
      type: object
      required:
        - name
        - label
        - required
      properties:
        name:
          type: string
          description: Field name (key in config object).
        label:
          type: string
          description: Human-readable label.
        required:
          type: boolean
          description: Whether this field is required.
        placeholder:
          type: string
          description: Placeholder text for UI.
        sensitive:
          type: boolean
          description: Whether the field contains sensitive data.
      description: Describes a config field for a provider type.
    Models.CreateAgentRequest:
      type: object
      required:
        - name
        - providerId
        - modelId
      properties:
        name:
          type: string
          description: Display name for this agent.
        providerId:
          type: string
          description: ID of the provider to use.
        modelId:
          type: string
          description: Model identifier.
        systemPromptId:
          type: string
          description: ID of an existing system prompt (optional).
        temperature:
          type: number
          format: float
          description: Sampling temperature (default 0.95).
        topP:
          type: number
          format: float
          description: Nucleus sampling top-p (default 0.95).
        topK:
          type: integer
          format: int32
          description: Top-k sampling (default 40).
      description: Request to create a new agent.
    Models.CreatePromptRequest:
      type: object
      required:
        - name
        - content
      properties:
        name:
          type: string
          description: Display name for this prompt.
        content:
          type: string
          description: Prompt content in markdown format.
      description: Request to create a new prompt.
    Models.CreateProviderRequest:
      type: object
      required:
        - name
        - providerType
      properties:
        name:
          type: string
          description: Display name for this provider.
        providerType:
          allOf:
            - $ref: '#/components/schemas/Models.ProviderType'
          description: The provider type.
        apiKey:
          type: string
          description: Full API key (stored securely, returned masked). Optional for providers that don't use API keys.
        baseUrl:
          type: string
          description: Optional base URL override.
        config:
          type: object
          additionalProperties:
            type: string
          description: Provider-specific configuration.
      description: Request to create a new provider configuration.
    Models.DeepSeekProviderConfig:
      type: object
      description: DeepSeek provider config (no extra fields needed).
    Models.ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Human-readable error description.
      description: Standard error response.
    Models.GoogleAIProviderConfig:
      type: object
      description: Google AI provider config (no extra fields needed).
    Models.HealthCheckResponse:
      type: object
      required:
        - status
        - message
      properties:
        status:
          allOf:
            - $ref: '#/components/schemas/Models.HealthStatus'
          description: Current status of the probe.
        message:
          type: string
          description: Human-readable description of the check result.
      description: Response body for health check endpoints.
    Models.HealthStatus:
      type: string
      enum:
        - up
        - down
      description: Status of a health check probe.
    Models.LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: Username to authenticate with.
        password:
          type: string
          description: Plaintext password.
      description: Request body for the login endpoint.
    Models.LoginResponse:
      type: object
      required:
        - username
      properties:
        username:
          type: string
          description: Authenticated username.
      description: Response after successful login.
    Models.LogoutResponse:
      type: object
      required:
        - ok
      properties:
        ok:
          type: boolean
      description: Response after successful logout.
    Models.MeResponse:
      type: object
      required:
        - username
      properties:
        username:
          type: string
          description: Username of the currently authenticated user.
      description: Current authenticated user info.
    Models.OllamaProviderConfig:
      type: object
      description: Ollama provider config (no extra fields needed, uses base_url).
    Models.OpenAICompatibleProviderConfig:
      type: object
      properties:
        organization:
          type: string
          description: Organization ID (e.g. for OpenAI org routing).
        customHeaders:
          type: string
          description: Custom headers as a JSON-encoded key-value object.
      description: OpenAI-compatible provider config.
    Models.OpenAIProviderConfig:
      type: object
      description: OpenAI provider config (no extra fields needed).
    Models.PromptListResponse:
      type: object
      required:
        - prompts
        - total
        - limit
        - offset
      properties:
        prompts:
          type: array
          items:
            $ref: '#/components/schemas/Models.PromptResponse'
          description: Array of prompts.
        total:
          type: integer
          format: int32
          description: Total number of prompts.
        limit:
          type: integer
          format: int32
          description: Number of prompts per page.
        offset:
          type: integer
          format: int32
          description: Number of prompts skipped.
      description: Paginated list of prompts.
    Models.PromptResponse:
      type: object
      required:
        - id
        - name
        - content
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          description: Unique prompt ID.
        name:
          type: string
          description: Display name for this prompt.
        content:
          type: string
          description: Prompt content in markdown format.
        createdAt:
          type: string
          format: date-time
          description: When this prompt was created.
        updatedAt:
          type: string
          format: date-time
          description: When this prompt was last updated.
      description: A prompt (system instruction) for an agent.
    Models.ProviderListResponse:
      type: object
      required:
        - providers
      properties:
        providers:
          type: array
          items:
            $ref: '#/components/schemas/Models.ProviderResponse'
          description: Array of provider configurations.
      description: List of configured providers.
    Models.ProviderResponse:
      type: object
      required:
        - id
        - name
        - providerType
        - enabled
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          description: Unique provider ID.
        name:
          type: string
          description: Display name for this provider configuration.
        providerType:
          allOf:
            - $ref: '#/components/schemas/Models.ProviderType'
          description: The provider type.
        apiKey:
          type: string
          description: Masked API key (last 4 characters visible). Null if provider does not use an API key.
        baseUrl:
          type: string
          description: Optional base URL override (e.g. for OpenAI-compatible proxies).
        config:
          type: object
          additionalProperties:
            type: string
          description: Provider-specific configuration as a JSON object.
        enabled:
          type: boolean
          description: Whether this provider is enabled.
        createdAt:
          type: string
          format: date-time
          description: When this provider was created.
        updatedAt:
          type: string
          format: date-time
          description: When this provider was last updated.
      description: A configured LLM provider with masked API key.
    Models.ProviderType:
      type: string
      enum:
        - google_ai
        - vertex_ai
        - openai
        - anthropic
        - ollama
        - xai
        - deepseek
        - azure_openai
        - bedrock
        - azure_ai_foundry
        - openai_compatible
      description: Supported LLM provider types.
    Models.ProviderTypeInfo:
      type: object
      required:
        - type
        - displayName
        - requiresApiKey
        - requiresBaseUrl
        - configFields
        - envVarHint
        - modelPrefix
      properties:
        type:
          allOf:
            - $ref: '#/components/schemas/Models.ProviderType'
          description: The provider type identifier.
        displayName:
          type: string
          description: Human-readable display name.
        requiresApiKey:
          type: boolean
          description: Whether this provider type requires an API key.
        requiresBaseUrl:
          type: boolean
          description: Whether this provider type requires a base URL.
        configFields:
          type: array
          items:
            $ref: '#/components/schemas/Models.ConfigFieldInfo'
          description: Config fields specific to this provider type.
        envVarHint:
          type: string
          description: Hint about which environment variable to set.
        modelPrefix:
          type: string
          description: Model name prefix used by Genkit.
        baseUrlDefault:
          type: string
          description: Default base URL if applicable.
        comingSoon:
          type: boolean
          description: True if this provider is not yet fully supported.
      description: Metadata about a provider type for dynamic UI rendering.
    Models.ProviderTypeListResponse:
      type: object
      required:
        - providerTypes
      properties:
        providerTypes:
          type: array
          items:
